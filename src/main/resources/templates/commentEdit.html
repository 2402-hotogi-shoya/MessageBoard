<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <link th:href="@{/css/style.css}" rel="styleSheet">
    <title>投稿編集</title>
</head>
<body>
<div class="header-contents">
    <h2>コメント編集</h2>
</div>
<div>
    ID : <span th:text="${commentForm.id}"/>
    MID : <span th:text="${commentForm.message_id}"/>
</div>
<div class="main-contents">
    <form th:method="put" th:action="@{/comment/update/{id}(id=${commentForm.id})}" th:object="${commentForm}">
        <input type="hidden" th:field="*{message_id}" />
        <div class="form-area">
            <label>投稿内容 </label>
            <div th:if="${#fields.hasErrors('text')}" th:errors="*{text}" style="color:red"></div>
            <textarea class="tweet-box" th:field="*{text}" size="20" maxlength="200" /></textarea><br/>
            <input type="submit" value="更新" />
        </div>
    </form>
</div>
<div class="footer-contents">
    <form action="/">
        <input type="submit" value="戻る" />
    </form>
</div>
</body>
</html>
